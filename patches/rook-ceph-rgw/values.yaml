---
rookCephRgw:
  objectBucketClaims:
    - name: tower-harbor-registry
      bucketName: tower-harbor-registry
      storageClassName: ceph-bucket
      labels:
        app.kubernetes.io/name: tower-harbor-registry
        app.kubernetes.io/part-of: tower-harbor
        scalex.io/infra-owner: b-k8s
    - name: rgw-analysis-web-bucket
      namespace: scalex-rgw-analysis-web
      bucketName: rgw-analysis-web-poc
      storageClassName: ceph-bucket
      annotations:
        scalex.io/bucket-naming-mode: compatibility-fixed
      labels:
        app.kubernetes.io/name: rgw-analysis-web
        app.kubernetes.io/part-of: scalex-federation-poc
        scalex.io/component: object-storage-claim
        scalex.io/infra-owner: b-k8s
        scalex.io/release: rgw-analysis-web
  services:
    - name: scalex-poc-rgw
      labels:
        app.kubernetes.io/name: scalex-poc-rgw
        app.kubernetes.io/part-of: scalex-federation-poc
        scalex.io/infra-owner: b-k8s
      annotations:
        lbipam.cilium.io/ips: 10.33.142.10
      spec:
        type: LoadBalancer
        selector:
          app: rook-ceph-rgw
          rook_cluster: csi-rook-ceph
          rook_object_store: scalex-poc
        ports:
          - name: http
            port: 80
            protocol: TCP
            targetPort: 8080
