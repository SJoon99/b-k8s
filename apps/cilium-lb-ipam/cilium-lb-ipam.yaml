---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: b-lb-pool
  labels:
    app.kubernetes.io/name: cilium-lb-ipam
    app.kubernetes.io/part-of: scalex-repo-poc
    org.ulagbulag.io/cluster: b
spec:
  blocks:
    - start: 10.33.142.1
      stop: 10.33.142.254
  # Empty selector means every LoadBalancer Service in b can receive an IP from
  # this pool unless a narrower pool is added later.
  serviceSelector:
    matchLabels: {}
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: b-l2-policy
  labels:
    app.kubernetes.io/name: cilium-lb-ipam
    app.kubernetes.io/part-of: scalex-repo-poc
    org.ulagbulag.io/cluster: b
spec:
  # Announce LoadBalancer IPs allocated by Cilium LB IPAM on the b-cluster L2 network.
  loadBalancerIPs: true
  serviceSelector:
    matchLabels: {}
